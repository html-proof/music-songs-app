name: Render Keepalive

on:
  schedule:
    # GitHub Actions minimum cron interval is 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs when one 5-minute run is delayed.
concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping Render backend every 10 seconds for 5 minutes
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "Missing required secret: RENDER_BACKEND_URL"
            exit 1
          fi

          BASE_URL="${KEEPALIVE_URL%/}"
          if [[ "$BASE_URL" == *"/healthz" ]]; then
            TARGET_URL="$BASE_URL"
          else
            TARGET_URL="$BASE_URL/healthz"
          fi

          echo "Pinging $TARGET_URL every 10s (30 times)"
          for i in $(seq 1 30); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET_URL" || echo "000")
            echo "[$i/30] HTTP status: $status_code"

            if [ "$status_code" -ge 400 ]; then
              echo "Keepalive ping failed."
              exit 1
            fi

            if [ "$i" -lt 30 ]; then
              sleep 10
            fi
          done
