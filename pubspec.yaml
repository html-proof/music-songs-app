name: music_hub
description: "A premium music streaming app."
publish_to: 'none'

version: 9.1.0+9

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  just_audio: ^0.10.5
  provider: ^6.1.5+1
  http: ^1.6.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  dio: ^5.9.1
  just_audio_background:
    path: third_party/just_audio_background
  audio_session: ^0.2.2
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^20.1.0
  connectivity_plus: ^6.1.3
  fuzzy: ^0.5.1
  noise_meter: ^5.1.0
  permission_handler: ^12.0.1
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_foreground.png
    - assets/icon_notification.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#0f0113"
    theme_color: "#b01777"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 256
